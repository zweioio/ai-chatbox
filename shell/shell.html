<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIChatbox</title>
  <script src="../shared/page_bootstrap.js"></script>
  <link rel="stylesheet" href="shell.css">
</head>
<body>
  <div class="shell-page">
    <div class="shell-topbar">
      <div class="shell-topbar-inner">
        <div class="shell-brand">
          <img class="shell-brand-logo" src="../icons/aichatbox.png" alt="">
          <span class="shell-brand-title">AIChatbox</span>
        </div>
        <div class="shell-nav">
          <button id="shell-nav-settings" class="shell-nav-btn" type="button" data-view="settings" data-top-icon="settings">设置</button>
          <button id="shell-nav-prompts" class="shell-nav-btn" type="button" data-view="prompts" data-top-icon="prompts">提示词</button>
          <button id="shell-nav-memo" class="shell-nav-btn" type="button" data-view="memo" data-top-icon="memo">备忘录</button>
          <button id="shell-nav-compare" class="shell-nav-btn" type="button" data-top-icon="compare">内容对比</button>
        </div>
      </div>
    </div>
    <div class="shell-content">
      <iframe id="shell-frame-settings" class="shell-frame" title="设置"></iframe>
      <iframe id="shell-frame-prompts" class="shell-frame" title="提示词"></iframe>
      <iframe id="shell-frame-memo" class="shell-frame" title="备忘录"></iframe>
    </div>
  </div>
  <script src="shell.js"></script>
</body>
</html>
