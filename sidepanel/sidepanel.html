<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Search Pro 侧边栏</title>
  <style>
    :root {
      --ai-sp-bg: #ffffff;
      --ai-sp-border: #e5e7eb;
      --ai-sp-text: #374151;
      --ai-sp-text-light: #6b7280;
      --ai-sp-primary: #3b82f6;
    }
    
    [data-ai-sp-theme="dark"] {
      --ai-sp-bg: #1f2937;
      --ai-sp-border: #374151;
      --ai-sp-text: #f3f4f6;
      --ai-sp-text-light: #9ca3af;
      --ai-sp-primary: #60a5fa;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--ai-sp-bg);
      color: var(--ai-sp-text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .ai-sp-sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--ai-sp-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .ai-sp-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .ai-sp-logo {
      color: var(--ai-sp-primary);
      font-size: 16px;
      font-weight: bold;
    }

    .ai-sp-header-controls {
      display: flex;
      gap: 8px;
    }

    .ai-sp-header-controls button {
      background: transparent;
      border: none;
      color: var(--ai-sp-text-light);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ai-sp-header-controls button:hover {
      background: var(--ai-sp-border);
      color: var(--ai-sp-text);
    }

    #ai-sp-sidebar-iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    .loading-container {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--ai-sp-bg);
      z-index: 10;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--ai-sp-border);
      border-top-color: var(--ai-sp-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="ai-sp-sidebar-header">
    <div class="ai-sp-title">
      <span class="ai-sp-logo">✦</span>
      Alsearchpro 侧边栏
    </div>
    <div class="ai-sp-header-controls">
      <button id="ai-sp-sidebar-web-btn" title="在网页打开">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
      </button>
      <button id="ai-sp-sidebar-window-btn" title="在小窗打开">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      </button>
    </div>
  </div>
  
  <div class="loading-container" id="loading">
    <div class="spinner"></div>
    <span>正在加载对话...</span>
  </div>
  
  <iframe id="ai-sp-sidebar-iframe" src="about:blank"></iframe>

  <script src="sidepanel.js"></script>
</body>
</html>
