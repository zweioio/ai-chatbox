<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIChatbox 内容对比</title>
  <script src="../shared/page_bootstrap.js"></script>
  <link rel="stylesheet" href="./compare.css" />
</head>
<body>
  <div class="cmp-app">
    <header class="cmp-header">
      <div class="cmp-header-brand">
        <img class="cmp-header-logo" src="../icons/aichatbox.png" alt="">
        <span class="cmp-header-brand-title">AIChatbox</span>
      </div>
      <div class="cmp-center-block">
        <div id="cmp-query-title" class="cmp-center-title"></div>
        <div id="cmp-restore-summary" class="cmp-restore-summary"></div>
      </div>
      <div class="cmp-header-actions">
        <span id="cmp-count" class="cmp-count">0/4</span>
        <span class="cmp-select-wrap">
          <select id="cmp-platform-select" class="cmp-select"></select>
        </span>
        <button id="cmp-add-btn" class="cmp-btn cmp-add">
          <span class="cmp-add-icon" aria-hidden="true"></span>
          <span>添加窗口</span>
        </button>
        <button id="cmp-favorite-btn" class="cmp-btn">
          <span>保存到备忘录</span>
        </button>
        <button id="cmp-memo-btn" class="cmp-toggle">
          <img src="../icons/memo.svg" width="18" height="18" alt="memo" />
          <span class="cmp-tooltip cmp-tooltip-right">打开备忘录</span>
        </button>
        <button id="cmp-settings-btn" class="cmp-toggle">
          <img src="../icons/settings.svg" width="18" height="18" alt="settings" />
          <span class="cmp-tooltip cmp-tooltip-right">打开设置</span>
        </button>
        <button id="cmp-theme-btn" class="cmp-toggle">
          <img class="cmp-theme-icon-sun" src="../icons/sun.svg" width="18" height="18" alt="sun" style="display:none;" />
          <img class="cmp-theme-icon-moon" src="../icons/moon.svg" width="18" height="18" alt="moon" />
          <span class="cmp-tooltip cmp-tooltip-right">切换深色模式</span>
        </button>
        <button id="cmp-panel-toggle" class="cmp-toggle">
          <img src="../icons/compare-diff-toggle.svg" width="18" height="18" alt="toggle" />
          <span class="cmp-tooltip cmp-tooltip-right">收起回答洞察</span>
        </button>
      </div>
    </header>

    <div id="cmp-body" class="cmp-body">
      <main id="cmp-grid" class="cmp-grid"></main>
      <aside id="cmp-panel" class="cmp-side">
        <div class="cmp-side-head">
          <div class="cmp-side-title">回答洞察</div>
          <div class="cmp-side-head-actions">
            <button id="cmp-refresh-btn" class="cmp-btn cmp-refresh">
              <img src="../icons/compare-refresh.svg" width="18" height="18" alt="refresh" />
              <span>重新读取</span>
            </button>
          </div>
        </div>
        <div id="cmp-panel-body" class="cmp-panel-body">
          <div class="cmp-legend">
            <button type="button" class="cmp-tag cmp-tag-filter cmp-tag-all is-active" data-filter="all">全部</button>
            <button type="button" class="cmp-tag cmp-tag-filter cmp-tag-match" data-filter="match">一致</button>
            <button type="button" class="cmp-tag cmp-tag-filter cmp-tag-diff" data-filter="diff">差异</button>
            <button type="button" class="cmp-tag cmp-tag-filter cmp-tag-miss" data-filter="miss">缺失</button>
          </div>
          <div id="cmp-legend-desc" class="cmp-legend-desc">全部 AI 模型的洞察内容信息</div>
          <div id="cmp-diff-list" class="cmp-diff-list"></div>
        </div>
      </aside>
    </div>

    <footer class="cmp-footer">
      <div class="cmp-input-wrap">
        <textarea id="cmp-global-input" class="cmp-input" placeholder="输入内容后，发送到全部对比窗口"></textarea>
        <button id="cmp-send-btn" class="cmp-send-btn" disabled>发送</button>
      </div>
    </footer>
    <div id="cmp-toast" class="cmp-toast" style="display:none;"></div>
  </div>
  <script src="./compare.js"></script>
</body>
</html>
