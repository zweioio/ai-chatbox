<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>备忘录</title>
  <script src="../shared/page_bootstrap.js"></script>
  <link rel="stylesheet" href="../shared/confirm_dialog.css">
  <link rel="stylesheet" href="favorites.css">
</head>
<body>
  <div class="fav-topbar">
    <div class="fav-topbar-inner">
      <div class="fav-topbar-brand">
        <img class="fav-topbar-logo" src="../icons/aichatbox.png" alt="">
        <span class="fav-topbar-title">AIChatbox</span>
      </div>
      <div class="fav-topbar-actions">
        <button id="fav-open-settings-btn" class="fav-topbar-btn" type="button" data-top-icon="settings">设置</button>
        <button id="fav-open-library-btn" class="fav-topbar-btn" type="button" data-top-icon="prompts">提示词</button>
        <button id="fav-open-memo-btn" class="fav-topbar-btn is-active" type="button" data-top-icon="memo">备忘录</button>
        <button id="fav-open-compare-btn" class="fav-topbar-btn" type="button" data-top-icon="compare">内容对比</button>
      </div>
    </div>
  </div>
  <div id="fav-list-page" class="fav-wrap">
    <div class="fav-head">
      <div>
        <h1>备忘录</h1>
        <p>保存会话记录、内容对比结果与导出的 Markdown 内容</p>
      </div>
    </div>
    <div id="fav-list" class="fav-list"></div>
  </div>
  <div id="fav-detail-page" class="fav-detail-page" hidden>
    <div class="fav-detail-shell">
      <div class="fav-detail-topbar">
        <button id="fav-detail-close" class="fav-detail-back-btn" type="button">
          <img src="../icons/settings-back.svg" alt="">
          <span>返回备忘录</span>
        </button>
        <div class="fav-detail-topbar-actions">
          <div class="fav-width-switch" role="group" aria-label="阅读宽度">
            <button type="button" class="fav-width-btn" data-reader-width="480">紧凑</button>
            <button type="button" class="fav-width-btn is-active" data-reader-width="760">标准</button>
            <button type="button" class="fav-width-btn" data-reader-width="920">宽松</button>
          </div>
          <button id="fav-detail-export" class="fav-detail-action-btn" type="button">导出</button>
          <button id="fav-detail-delete" class="fav-detail-icon-btn" type="button" data-tip="删除">
            <img src="../icons/delete.svg" alt="">
          </button>
        </div>
      </div>
      <div id="fav-detail-body" class="fav-detail-body"></div>
    </div>
  </div>
  <div id="fav-export-mask" class="fav-export-mask" hidden>
    <div class="fav-export-dialog" role="dialog" aria-modal="true" aria-labelledby="fav-export-title">
      <div class="fav-export-head">
        <div>
          <strong id="fav-export-title">导出对话图片</strong>
          <p id="fav-export-status">预览生成后可下载图片</p>
        </div>
        <button id="fav-export-close" class="pl-icon-btn" type="button">✕</button>
      </div>
      <div class="fav-export-preview">
        <div id="fav-export-preview-content" class="fav-export-preview-content"></div>
      </div>
      <div class="fav-export-actions">
        <div class="fav-width-switch fav-export-width-switch" role="group" aria-label="导出宽度">
          <button type="button" class="fav-export-width-btn" data-reader-width="480">紧凑</button>
          <button type="button" class="fav-export-width-btn is-active" data-reader-width="760">标准</button>
          <button type="button" class="fav-export-width-btn" data-reader-width="920">宽松</button>
        </div>
        <button id="fav-export-download" class="fav-detail-action-btn" type="button">下载图片</button>
      </div>
    </div>
  </div>
  <div id="fav-export-stage" class="fav-export-stage" aria-hidden="true"></div>
  <script src="../shared/confirm_dialog.js"></script>
  <script src="favorites.js"></script>
</body>
</html>
