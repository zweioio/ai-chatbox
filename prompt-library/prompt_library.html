<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提示词</title>
  <script src="../shared/page_bootstrap.js"></script>
  <link rel="stylesheet" href="prompt_library.css">
</head>
<body>
  <div class="pl-topbar">
    <div class="pl-topbar-inner">
      <div class="pl-topbar-brand">
        <img class="pl-topbar-logo" src="../icons/aichatbox.png" alt="">
        <span class="pl-topbar-title">AIChatbox</span>
      </div>
      <div class="pl-topbar-actions">
        <button id="pl-open-settings-btn" class="pl-topbar-btn" type="button" data-top-icon="settings">设置</button>
        <button id="pl-open-library-btn" class="pl-topbar-btn is-active" type="button" data-top-icon="prompts">提示词</button>
        <button id="pl-open-memo-btn" class="pl-topbar-btn" type="button" data-top-icon="memo">备忘录</button>
        <button id="pl-open-compare-btn" class="pl-topbar-btn" type="button" data-top-icon="compare">内容对比</button>
      </div>
    </div>
  </div>
  <div class="pl-wrap">
    <div class="pl-hero">
      <div class="pl-hero-copy">
        <h1>提示词</h1>
        <div class="pl-hero-meta">
          <p>重做为更完整的提示词中心，支持搜索、图标、变量插入、复制、导入导出和快速编辑</p>
          <span id="pl-status-text" class="pl-hero-status">已同步</span>
        </div>
      </div>
      <div class="pl-actions">
        <button id="pl-import-btn">导入 JSON</button>
        <button id="pl-export-btn">导出 JSON</button>
      </div>
    </div>
    <input id="pl-import-input" type="file" accept="application/json" hidden />
    <div class="pl-toolbar">
      <div class="pl-search">
        <input id="pl-search-input" type="search" placeholder="搜索标题、内容、变量" />
      </div>
      <div class="pl-summary">
        <span id="pl-count-text">0 条提示词</span>
      </div>
    </div>
    <div class="pl-variables">
      <div class="pl-variable-layout">
        <div class="pl-variable-content">
          <div class="pl-section-title">可用变量</div>
          <div class="pl-variable-list">
            <button class="pl-variable-chip" data-variable="{{text}}" data-tip="选中文本">{{text}}</button>
            <button class="pl-variable-chip" data-variable="{{context}}" data-tip="上下文">{{context}}</button>
            <button class="pl-variable-chip" data-variable="{{page}}" data-tip="页面标题">{{page}}</button>
            <button class="pl-variable-chip" data-variable="{{url}}" data-tip="页面地址">{{url}}</button>
            <button class="pl-variable-chip" data-variable="{{time}}" data-tip="当前时间">{{time}}</button>
          </div>
        </div>
        <div class="pl-variable-actions">
          <div class="pl-variable-head-actions">
            <button id="pl-reset-btn">恢复默认</button>
            <button id="pl-add-btn">新建提示词</button>
          </div>
        </div>
      </div>
    </div>
    <div id="pl-list" class="pl-list"></div>
    <div id="pl-empty" class="pl-empty" hidden>
      <div class="pl-empty-icon">⌘</div>
      <strong>没有找到匹配的提示词</strong>
      <span>可以换个关键词试试，或者新建一条提示词。</span>
    </div>
  </div>
  <div id="pl-editor-mask" class="pl-editor-mask" hidden>
    <div class="pl-editor">
      <div class="pl-editor-head">
        <div>
          <strong id="pl-editor-title">新建提示词</strong>
          <div class="pl-editor-meta">
            <p>支持图标、变量和实时预览</p>
            <span id="pl-editor-note" class="pl-editor-note" hidden>系统内置提示词暂不支持编辑</span>
          </div>
        </div>
        <button id="pl-editor-close" class="pl-icon-btn">✕</button>
      </div>
      <div class="pl-editor-body">
        <div class="pl-grid pl-editor-title-grid">
          <div class="pl-field">
            <label for="pl-form-title">标题</label>
            <input id="pl-form-title" class="pl-input" maxlength="40" placeholder="例如：代码审查" />
          </div>
          <div class="pl-field pl-icon-field">
            <label for="pl-form-icon-key">图标</label>
            <input id="pl-form-icon-key" type="hidden" />
            <button id="pl-form-icon-trigger" class="pl-icon-trigger" type="button" aria-haspopup="dialog" aria-expanded="false">
              <span id="pl-form-icon-preview" class="pl-card-icon pl-card-icon-picker"></span>
            </button>
            <div id="pl-icon-picker" class="pl-icon-picker" hidden>
              <div class="pl-icon-picker-grid"></div>
            </div>
          </div>
        </div>
        <div class="pl-field">
          <label for="pl-form-template">提示词内容</label>
          <textarea id="pl-form-template" class="pl-textarea" placeholder="请输入提示词内容"></textarea>
        </div>
        <div class="pl-inline-tools">
          <span class="pl-inline-tools-label">插入变量</span>
          <div class="pl-variable-list">
            <button class="pl-variable-chip" data-variable="{{text}}" data-tip="选中文本">{{text}}</button>
            <button class="pl-variable-chip" data-variable="{{context}}" data-tip="上下文">{{context}}</button>
            <button class="pl-variable-chip" data-variable="{{page}}" data-tip="页面标题">{{page}}</button>
            <button class="pl-variable-chip" data-variable="{{url}}" data-tip="页面地址">{{url}}</button>
            <button class="pl-variable-chip" data-variable="{{time}}" data-tip="当前时间">{{time}}</button>
          </div>
        </div>
        <div class="pl-grid pl-editor-meta-grid">
          <div class="pl-field">
            <label class="pl-checkbox">
              <input id="pl-form-enabled" type="checkbox" checked />
              <span class="pl-checkbox-indicator settings-chip-check" aria-hidden="true"></span>
              <span class="pl-checkbox-label">启用这条提示词</span>
            </label>
          </div>
        </div>
        <div class="pl-preview">
          <div class="pl-section-title">预览效果</div>
          <div id="pl-preview-text" class="pl-preview-box"></div>
        </div>
      </div>
      <div class="pl-editor-foot">
        <button id="pl-editor-delete" class="pl-danger-btn" type="button">删除</button>
        <div class="pl-editor-actions">
          <button id="pl-editor-cancel" type="button">取消</button>
          <button id="pl-editor-save" class="primary" type="button">保存提示词</button>
        </div>
      </div>
    </div>
  </div>
  <div id="pl-confirm-mask" class="pl-confirm-mask" hidden>
    <div class="pl-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="pl-confirm-title">
      <div class="pl-confirm-head">
        <div class="pl-confirm-icon-wrap">
          <img src="../icons/delete.svg" alt="">
        </div>
        <div class="pl-confirm-copy">
          <strong id="pl-confirm-title">删除提示词</strong>
          <p id="pl-confirm-text">确认删除当前提示词吗？删除后无法恢复。</p>
        </div>
      </div>
      <div class="pl-confirm-actions">
        <button id="pl-confirm-cancel" type="button">取消</button>
        <button id="pl-confirm-submit" class="pl-danger-btn" type="button">删除</button>
      </div>
    </div>
  </div>
  <script src="prompt_library.js"></script>
</body>
</html>
